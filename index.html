<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beatriz Reis — Escolha o design</title>
<style>
  body { font-family: sans-serif; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .wrap { text-align: center; }
  h1 { font-size: 1.5rem; margin-bottom: 2rem; color: #aaa; font-weight: 400; }
  .links { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
  a { display: block; padding: 1.2rem 2.5rem; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 1rem; transition: transform .2s; }
  a:hover { transform: translateY(-3px); }
  .v1 { background: #c8f135; color: #111; }
  .v2 { background: #e85d26; color: #fff; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Escolha a versão para visualizar</h1>
  <div class="links">
    <a href="portfolio-v1/" class="v1">Versão 1 — Dark / Verde limão</a>
    <a href="portfolio-v2/" class="v2">Versão 2 — Light / Laranja</a>
  </div>
</div>
</body>
</html>
